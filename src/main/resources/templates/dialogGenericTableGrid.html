{@org.jaw.qutetable.gentable.TableDialogData data}
<div id="masterDetailPane" class="resize-wrapper">
  <div id="mainTablePane">
    <table id="genericTable">
      <!------------------------------------------------------------------------------------>
      <thead id="genericTableHeader">
      <tr>
        {#for col in data.columns}
          <th title="{col.description}" , onclick="localSortTable({col_index})">{col.name}</th>
        {/for}
      </tr>
      </thead>
      <!------------------------------------------------------------------------------------>
      <tbody id="genericTableBody">
      {#for row in data.rows}
        <tr class="row-clickable" details='{row.getDetailsJson()}'>
          {#for cell in row.cells}
            <td title="{cell.description}">{cell.content}</td>
          {/for}
          <td hidden="true" class="details">{row.details}</td>
        </tr>
      {/for}
      </tbody>
      <!------------------------------------------------------------------------------------>
    </table>
  </div>
  <div id="resizer"></div>
  <div id="detailPane">
    <div class="detailColumnPane">
      <h4>Details</h4>
      <div id="kvContent"><p style="color: #999;">Select a Row...</p></div>
    </div>
    <div class="detailJsonPane">
      <h4>JSON Inspector</h4>
      <div id="jsonContent" class="json-tree"></div>
    </div>
  </div>
</div>
<script>
    {
        //==================================
        // DETAILS
        //==================================
        function createKvList(map) {
            let html = '';
            for (const [key, value] of Object.entries(map)) {
                html += `<div class="kv-key">$\{key}</div><div class="kv-value">$\{value}</div>`;
            }
            return html;
        }

        document.getElementById('genericTableBody').addEventListener('click', e => {
            const row = e.target.closest('.row-clickable');
            if (!row) return;
            document.querySelectorAll('.row-clickable').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            const detailMap = JSON.parse(row.getAttribute('details'));
            const kvList = createKvList(detailMap);
            const innerHtml = '<div class="kv-grid">' + kvList + '</div>';
            document.getElementById('kvContent').innerHTML = innerHtml;
            //--- JSON Baum
            document.getElementById('jsonContent').innerHTML = `SELECTED`;
        });

        //==================================
        // RESIZER
        //==================================
        const detailPane = document.getElementById('detailPane');
        let isResizing = false;
        let startY = 0;
        let startHeight = 0;
        document.getElementById('resizer').addEventListener('mousedown', e => {
            isResizing = true
            startY = e.clientY;
            startHeight = detailPane.offsetHeight;
        });
        document.addEventListener('mousemove', e => {
            if (!isResizing) return;
            const yDiff = e.clientY - startY;
            const newHeight = startHeight - yDiff;
            if (newHeight > 100 && newHeight < window.innerHeight * 0.8) {
                detailPane.style.height = newHeight + 'px';
            }
        });
        document.addEventListener('mouseup', () => isResizing = false);


    }
</script>
