{@org.jaw.qutetable.gentable.templatedata.TableDialogData data}
<div id="masterDetailPane" class="resize-container">
  <div id="mainTablePane" class="main-table resize-top">
    <table id="genericTable" class="table">
      <!------------------------------------------------------------------------------------>
      <thead id="genericTableHeader" class="table-header">
      <tr>
        {#for col in data.columns}
          <th class="main-th" title="{col.description}" data-colidx="{col_index}">{col.name}<div class="resizer"></div></th>
        {/for}
      </tr>
      </thead>
      <!------------------------------------------------------------------------------------>
      <tbody id="genericTableBody" class="table-body">
      {#for row in data.rows}
        <tr class="row-clickable" details='{row.getDetailsJson()}' jsonDetails='{row.jsonDetails}'>
          {#for cell in row.cells}
            <td class="main-td" title="{cell.description}">{cell.content}</td>
          {/for}
        </tr>
      {/for}
      </tbody>
      <!------------------------------------------------------------------------------------>
    </table>
    <div id="resizeSeparator" class="resize-separator"></div>
  </div>
  <div id="detailPane" class="resize-bottom">
    <div class="detailColumnPane">
      <!--span class="detail-header">Details</span-->
      <div id="kvContent"><p>Select a Row...</p></div>
    </div>
    <div id="detailJsonPane" class="detailJsonPane">
      <span class="detail-header">JSON Details</span>
      <div id="jsonContent" class="jsonContent"></div>
    </div>
  </div>
</div>
<script>
    {
        //==================================
        // DETAILS
        //==================================
        function createKvList(map) {
            let html = '<table class="detail-table">';
            html += '<thead><tr> <th style="width:20%;">Key<div class="resizer"></div></th> <th>Value</th> </tr></thead>';
            html += '<tbody>';
            for (const [key, value] of Object.entries(map)) {
                html += '<tr>'
                html += `<td class="kv-key">$\{key}</td> <td class="kv-value">$\{value}</td>`;
                html += '</tr>'
            }
            html += '</tbody>';
            html += '</table>';
            return html;
        }

        function createJsonTree(data, isLast = true) {
            if (typeof data !== 'object' || data === null) {
                const valSpan = createJsonValueSpan(data);
                if (!isLast) valSpan.append(',');
                return valSpan;
            }
            const isArray = Array.isArray(data);
            const container = document.createElement('div');
            container.className = 'json-node';
            const toggle = document.createElement('span');
            toggle.className = 'toggle';
            toggle.textContent = '▼';
            container.appendChild(toggle);
            container.appendChild(document.createTextNode(isArray ? '[' : '{'));
            const list = document.createElement('ul');
            const keys = Object.keys(data);
            keys.forEach((key, index) => {
                const li = document.createElement('li');
                const lastInLevel = index === keys.length - 1;
                if (!isArray) {
                    const keySpan = document.createElement('span');
                    keySpan.className = 'key';
                    keySpan.textContent = `"$\{key}": `;
                    li.appendChild(keySpan);
                }
                li.appendChild(createJsonTree(data[key], lastInLevel));
                list.appendChild(li);
            });
            container.appendChild(list);
            const closingText = (isArray ? ']' : '}') + (isLast ? '\n' : ', ');
            container.appendChild(document.createTextNode(closingText));
            toggle.onclick = (e) => {
                e.stopPropagation();
                const isHidden = list.classList.toggle('hidden');
                toggle.textContent = isHidden ? '▶' : '▼';
            };
            return container;
        }

        function createJsonValueSpan(val) {
            const span = document.createElement('span');
            if (typeof val === 'string') {
                span.className = 'string';
                span.textContent = `"$\{val}"`;
            } else if (typeof val === 'number') {
                span.className = 'number';
                span.textContent = val;
            } else if (typeof val === 'boolean') {
                span.className = 'boolean';
                span.textContent = val;
            } else {
                span.className = 'null';
                span.textContent = 'null';
            }
            return span;
        }

        document.getElementById('genericTableBody').addEventListener('click', e => {
            const row = e.target.closest('.row-clickable');
            if (!row) return;
            document.querySelectorAll('.row-clickable').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            const detailMap = JSON.parse(row.getAttribute('details'));
            const kvList = createKvList(detailMap);
            const innerHtml = '<div class="kv-grid">' + kvList + '</div>';
            document.getElementById('kvContent').innerHTML = innerHtml;
            //--- JSON Baum
            let output = document.getElementById('jsonContent');
            try {
                const parsed = JSON.parse(row.getAttribute('jsonDetails'));
                output.innerHTML = "";
                output.appendChild(createJsonTree(parsed));
            } catch (e) {
                output.innerHTML = `<span class="error">Ungültiges JSON: $\{e.message}</span>`;
            }
        });

        //==================================
        // Table Column Resizer
        //==================================
        document.addEventListener('mousedown', function(e) {
            if (e.target.classList.contains('resizer')) {
                const resizer = e.target.closest('.resizer');
                const th = resizer.parentElement;
                const nextTh = th.nextElementSibling;
                if (!nextTh) return;
                const startX = e.pageX;
                const thStartWidth = th.offsetWidth;
                const nextThStartWidth = nextTh.offsetWidth;
                const onMouseMove = e => {
                    const diff = e.pageX - startX;
                    if (thStartWidth + diff > 50 && nextThStartWidth - diff > 50) {
                        th.style.width = `$\{thStartWidth + diff}px`;
                        nextTh.style.width = `$\{nextThStartWidth - diff}px`;
                    }
                };
                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }
        });
    }
</script>
