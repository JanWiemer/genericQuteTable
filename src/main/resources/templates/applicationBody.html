<div class="app-container" hx-on::beforeSend="interceptHTMX(event)">
  <aside id="sidebar">
      {#include applicationNav.html /}
  </aside>
  <main>
    <div id="dialogArea">
        {#include applicationDialog.html/}
    </div>
  </main>
</div>
<footer id="statusbar">
  <div>
    Status: <span id="stEvent" class="status-val">Ready</span> |
    Query: <span id="stQuery" class="status-val">-</span> |
    Sort: <span id="stSort" class="status-val">-</span>
  </div>
  <div style="opacity:0.5">HTMX Intercept Active</div>
</footer>
<script>
  //==================================
  // HTMX INTERCEPT
  function interceptHTMX(event) {
    console.log("interceptHTMX", event);
    event.preventDefault();
    const p = event.detail.parameters;
    document.getElementById('stEvent').textContent = "Intercepted";
    document.getElementById('stQuery').textContent = p.filter || "none";
    document.getElementById('stSort').textContent = `Col $\{p.sortCol} ($\{p.sortDir})`;
  }
  //==================================
</script>
