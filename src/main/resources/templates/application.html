<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generic Qute Table Application</title>
  <link rel="stylesheet" href="/devui/devuiStyle.css">
</head>
<body>
<script src="/_importmap/generated_importmap.js"></script>
<script type="module">
    import 'htmx.org';
    import lucene from 'lucene-query-parser';
</script>
<header class="app-header">Generic Table Demo Application</header>
<div class="app-container" hx-on::beforeSend="interceptHTMX(event)">
  <aside id = "app-sidebar-left" class="app-sidebar-left">
      {#include applicationMenue.html /}
  </aside>
  <main class="app-main-area">
    <div id="dialogArea" class="app-dialog-area">
      <h3>Select a Dialog!</h3>
    </div>
  </main>
</div>
<footer id="statusbar"  class="app-footer">
  <div>
    Status: <span id="requestStatus" class="status-val">Ready</span> |
    Query: <span id="statusText" class="status-val">-</span>
  </div>
</footer>
<script>
    //==================================
    // HTMX INTERCEPT
    //==================================
    document.body.addEventListener('htmx:afterOnLoad', function (evt) {
        document.getElementById('requestStatus').innerText = evt.detail.xhr.status + ' ' + evt.detail.xhr.statusText;
    });
    document.body.addEventListener('htmx:sendError', function (evt) {
        document.getElementById('requestStatus').innerText = 'Disconnected';
    });
    document.body.addEventListener('htmx:responseError', function (evt) {
        document.getElementById('requestStatus').innerText = evt.detail.xhr.status + ' ' + evt.detail.xhr.statusText;
    });
    //==================================
</script>
</body>
</html>
