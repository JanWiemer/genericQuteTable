{@org.jaw.qutetable.ApplicationMenu menu}
<div class="sidebar-header">
  <span class="logo">Generic Table App</span>
  <button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</button>
</div>
<nav class="sidebar-menu">
  <ul style="list-style: none; padding: 0;">
    {#for menuItem in menu.flatMenuItems}
      <li id="node-{menuItem.fullPath}" class="menu-item"
          data-level="{menuItem.level}"
          data-path="{menuItem.fullPath}"
          data-parent="{menuItem.parentPath}"
          style="padding-left: {menuItem.padding}; {#if menuItem.level > 0}display: none;{/if}">
        {#if menuItem.isLeaf}
          <a class="menu-link" hx-get={menuItem.dialogResourcePath} hx-target="#dialogArea"hx-swap="innerHTML">
            <span class="icon">📄</span> {menuItem.label}
          </a>
        {#else}
          <button class="menu-node" onclick="toggleMenu('{menuItem.fullPath}', {menuItem.level})">
            <span class="icon">▶</span> {menuItem.label}
          </button>
        {/if}
      </li>
    {/for}
  </ul>
</nav>

<script>
    function toggleMenu(path, level) {
        const clickedElement = document.getElementById('node-' + path);
        const isOpening = !clickedElement.classList.contains('open');
        const siblings = document.querySelectorAll(`.menu-item[data-level="$\{level}"][data-parent="$\{clickedElement.dataset.parent}"]`);
        siblings.forEach(sib => { // --- close all siblings
            sib.classList.remove('open');
            closeMenuChildren(sib.dataset.path);
        });
        if (isOpening) {  // --- open selected element and show children
            clickedElement.classList.add('open');
            const children = document.querySelectorAll(`.menu-item[data-parent="$\{path}"]`);
            children.forEach(child => child.style.display = 'block');
        }
    }

    function closeMenuChildren(parentPath) {
        const children = document.querySelectorAll(`.menu-item[data-parent="$\{parentPath}"]`);
        children.forEach(child => {
            child.style.display = 'none';
            child.classList.remove('open');
            closeMenuChildren(child.dataset.path); // Rekursiv alles zuklappen
        });
    }
</script>
